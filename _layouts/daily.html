---
layout: default
---

<article class="daily-report">
  <header class="report-header">
    <h1>{{ page.title }}</h1>
    <p class="report-meta">
      <span class="date">📅 {{ page.date | date: "%Y年%m月%d日" }}</span>
      <span class="categories">
        {% for cat in page.categories %}
          <span class="category-tag">{{ cat }}</span>
        {% endfor %}
      </span>
    </p>
  </header>
  
  <div class="report-content">
    {{ content }}
  </div>
  
  <nav class="report-nav">
    {% if page.previous %}
      <a href="{{ page.previous.url | relative_url }}" class="prev">← {{ page.previous.title }}</a>
    {% endif %}
    
    <a href="{{ '/archive' | relative_url }}" class="archive">📚 历史归档</a>
    
    {% if page.next %}
      <a href="{{ page.next.url | relative_url }}" class="next">{{ page.next.title }} →</a>
    {% endif %}
  </nav>
</article>
